<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benjamin's Page</title>
    <link rel="shortcut icon" type="image/jpg" href="/apple-touch-icon.png"/>
    <link rel="stylesheet" href="stylesmain.css">
    <link rel="stylesheet" href="stylescontact.css">
</head>

<body>
    <nav class="navbar">
        <a href="/index.html" class="logo">BENS</a>
        <div class="right-section">
            <a href="/index.html" class="navbar-links">ABOUT</a>
            <a href="/contact.html" class="navbar-links">CONTACT ME</a>
        </div>
    </nav>

    <main>
        <aside class="side-bar">
            <ul>
                <li>Phone: <br>87828941</li>
                <li>Email: <br>BenjaminLSK@live.com</li>
                <li>
                    <a href="#home">Facebook</a>
                </li>
                <li>
                    <a href="#home">Linkedin</a>
                </li>
            </ul>
        </aside>

        <div class="contact-form">
            <form class="form-element">
                <h1>Contact me today!</h1>
                <label class="form-label">First name:</label>
                <input type="text" placeholder="First name">
                <label class="form-label">Last name:</label>
                <input type="text" placeholder="Last name">
                <label class="form-label">Email:</label>
                <input type="text" placeholder="Email Address">
                <label class="form-label">Any Enquiries:</label>
                <textarea name="message" rows="10" cols="30"></textarea>
                <div class="radio-btn">
                    <p>Urgency level :</p>
                    <input type="radio" id="not-urgent" name="urgency">
                    <label for="not-urgent">Not urgent</label><br>
                    <input type="radio" id="moderate" name="urgency">
                    <label for="moderate">Moderate</label><br>
                    <input type="radio" id="very-urgent" name="urgency">
                    <label for="very-urgent">Very urgent</label>
                </div>
                <input class="submit-btn" type="submit" value="Submit">
            </form>

        </div>
    </main>

    <footer>
        <p>&#169 all rights reserved 2021</p>
        <a href="#home" class="footer-links">ABOUT</a>
        <a href="#contact" class="footer-links">CONTACT ME</a>
    </footer>
